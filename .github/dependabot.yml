version: 2

registries:
  ecr-docker:
    type: docker-registry
    url: https://567716553783.dkr.ecr.us-east-1.amazonaws.com
    username: ${{secrets.ECR_AWS_ACCESS_KEY_ID}}
    password: ${{secrets.ECR_AWS_SECRET_ACCESS_KEY}}
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.GH_TOKEN }}
  git-github:
    type: git
    url: https://github.com
    username: x-access-token
    password: '${{ secrets.GH_TOKEN }}'

updates:
  - package-ecosystem: npm
    schedule:
      interval: weekly
      day: sunday
    groups:
      dependencies:
        patterns:
          - "*"
    directories:
      - "/"
    commit-message:
      prefix: fix(dependabot)
    registries:
      - npm-github
      - git-github

  - package-ecosystem: github-actions
    schedule:
      interval: weekly
      day: sunday
    groups:
      dependencies:
        patterns:
          - "*"
    # recursively check in all subdirectories, there are actions
    # references that are not within the .github/ or other root folders
    directories:
      - "/"
    commit-message:
      prefix: fix(dependabot)
    registries:
      - git-github

  - package-ecosystem: docker
    schedule:
      interval: weekly
      day: sunday
    groups:
      dependencies:
        patterns:
          - "*"
    directories:
      - "/"
    commit-message:
      prefix: fix(dependabot)
    registries:
      - ecr-docker
