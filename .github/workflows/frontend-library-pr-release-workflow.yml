#trigger changes
name: Library PR & Release Workflow

on:
  workflow_call:
    inputs:
      # Node configuration
      node-version:
        description: 'Node.js version'
        type: string
        default: '20'
      
      # Runner configuration
      runner:
        description: 'Runner to use'
        type: string
        default: '["ci-universal-scale-set"]'
      
      # Commands
      lint-command:
        description: 'Lint command'
        type: string
        default: 'yarn lint'
      
      test-command:
        description: 'Test command'
        type: string
        default: 'yarn test --coverage'
      
      build-command:
        description: 'Build command (optional, leave empty to skip)'
        type: string
        default: ''
      
      # Semantic Release
      run-semantic-release:
        description: 'Run semantic-release on specified branches'
        type: boolean
        default: true
      
      semantic-release-branches:
        description: 'Branches to run semantic-release on (JSON array)'
        type: string
        default: '["main", "beta", "alpha", "next"]'
      
      # SonarCloud (DEPRECATED — SonarCloud has been decommissioned; these inputs
      # are retained as no-ops for backward compatibility and will be removed in a
      # future major version).
      run-sonarcloud:
        description: 'DEPRECATED — SonarCloud is decommissioned. Input is a no-op.'
        type: boolean
        default: false

      sonar-project-key:
        description: 'DEPRECATED — SonarCloud is decommissioned. Input is a no-op.'
        type: string
        default: ''
      
      # Timeouts
      timeout-minutes:
        description: 'Job timeout in minutes'
        type: number
        default: 15

      package-manager:
        description: 'Package manager to use: "yarn" or "pnpm". Callers using pnpm must pass all commands explicitly.'
        type: string
        default: 'yarn'

      semantic-release-command:
        description: 'Semantic release command. Callers using pnpm must pass all commands explicitly.'
        type: string
        default: 'yarn semantic-release'
    
    secrets:
      GH_TOKEN:
        required: true
      SONAR_CLOUD_TOKEN:
        # DEPRECATED — SonarCloud is decommissioned. Secret is no longer consumed.
        required: false

permissions:
  contents: write
  pull-requests: write

# Concurrency control: Cancel old runs for PRs, never cancel for main branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks-and-release:
    name: 🔍 Checks & Release
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for semantic-release
      
      - name: Setup Node with Cache
        uses: Typeform/.github/shared-actions/setup-node-with-cache@main
        with:
          node-version: ${{ inputs.node-version }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      
      - name: Run linters
        run: ${{ inputs.lint-command }}
      
      - name: Run tests
        run: ${{ inputs.test-command }}
      
      - name: Build (if specified)
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}
      
      - name: Semantic Release
        if: |
          inputs.run-semantic-release &&
          contains(fromJSON(inputs.semantic-release-branches), github.ref_name)
        run: ${{ inputs.semantic-release-command }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.GH_TOKEN }}
      
      # SonarCloud Scan — REMOVED (SonarCloud has been decommissioned).
      # The `run-sonarcloud`, `sonar-project-key` inputs and `SONAR_CLOUD_TOKEN`
      # secret above are retained as no-ops for backward compatibility.
