#trigger changes
name: SonarCloud Scan (DEPRECATED)

# DEPRECATED — SonarCloud has been decommissioned. This workflow is kept as a
# no-op for backward compatibility with any external caller still referencing
# `Typeform/.github/.github/workflows/sonarcloud-scan.yml@v1`. It logs a
# deprecation notice and exits successfully.

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: false
      node-version:
        type: string
        required: false
      use-asdf:
        type: boolean
        required: false
      cache-mode:
        type: string
        required: false
      disable-restore-keys:
        type: boolean
        required: false
      package-manager:
        type: string
        required: false
      runner:
        type: string
        required: false
      coverage-artifact-name:
        type: string
        required: false
      timeout:
        type: number
        required: false

    secrets:
      GH_TOKEN:
        required: false
      SONAR_CLOUD_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  sonarcloud:
    name: 🔍 SonarCloud Analysis (deprecated no-op)
    runs-on: ubuntu-latest
    steps:
      - name: Deprecation notice
        run: |
          echo "::warning::SonarCloud has been decommissioned. This workflow is a no-op."
          echo "::warning::Remove any 'uses: Typeform/.github/.github/workflows/sonarcloud-scan.yml' entry from your workflows."
