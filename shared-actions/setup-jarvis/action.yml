name: 'Setup Jarvis'
description: 'Setup Jarvis from npm, GitHub branch, or local development'
inputs:
  jarvis-branch:
    description: 'Jarvis branch to use (empty = npm version from package.json)'
    required: false
    default: ''
  GH_TOKEN:
    description: 'GitHub token for private repo access'
    required: true
  working-directory:
    description: 'Working directory for the project'
    required: false
    default: '.'
  package-manager:
    description: 'Package manager to use: "yarn" or "pnpm"'
    required: false
    default: 'yarn'

runs:
  using: 'composite'
  steps:
    - name: Setup Jarvis
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ inputs.GH_TOKEN }}
        JARVIS_BRANCH: ${{ inputs.jarvis-branch }}
        PM: ${{ inputs.package-manager }}
      run: |
        if [ "$ACT" = "true" ]; then
          # Local testing with act: link local Jarvis
          echo "🔗 Linking local Jarvis from /Users/kevin.barz/code/jarvis"
          JARVIS_LOCAL="/Users/kevin.barz/code/jarvis"
          if [ -f "$JARVIS_LOCAL/pnpm-lock.yaml" ]; then
            cd "$JARVIS_LOCAL"
            pnpm install --frozen-lockfile
            pnpm link
          else
            cd "$JARVIS_LOCAL"
            yarn install --frozen-lockfile
            yarn link
          fi
          cd "$GITHUB_WORKSPACE"
          if [ "$PM" = "pnpm" ]; then
            pnpm link "$JARVIS_LOCAL"
          else
            yarn link @typeform/jarvis
          fi
          echo "✅ Jarvis linked from local development copy"
          ls -la node_modules/@typeform/jarvis
        elif [ -n "$JARVIS_BRANCH" ]; then
          # CI with branch specified: clone and link from GitHub
          echo "📦 Installing Jarvis from GitHub branch: $JARVIS_BRANCH"
          JARVIS_DIR="/tmp/jarvis-$JARVIS_BRANCH"
          
          # Clone the specified branch (using GH_TOKEN for private repo)
          git clone --depth 1 --branch "$JARVIS_BRANCH" \
            "https://x-access-token:${GH_TOKEN}@github.com/Typeform/jarvis.git" "$JARVIS_DIR"
          
          # Install Jarvis using its own lockfile, not the caller's PM
          cd "$JARVIS_DIR"
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --frozen-lockfile
            pnpm link
          else
            yarn install --frozen-lockfile
            yarn link
          fi
          # Link to this project using caller's PM
          cd "$GITHUB_WORKSPACE"
          if [ "$PM" = "pnpm" ]; then
            pnpm link "$JARVIS_DIR"
          else
            yarn link @typeform/jarvis
          fi
          
          echo "✅ Jarvis linked from GitHub branch: $JARVIS_BRANCH"
          echo "📍 Jarvis location: $JARVIS_DIR"
          ls -la node_modules/@typeform/jarvis
        else
          # Default: use npm version from package.json (already installed by install step)
          echo "📦 Using Jarvis from npm (version from package.json)"
          if [ -f "node_modules/@typeform/jarvis/package.json" ]; then
            echo "✅ Jarvis version: $(node -p "require('./node_modules/@typeform/jarvis/package.json').version")"
          else
            echo "⚠️ Jarvis not found in node_modules - may need to run $PM install first"
          fi
        fi

    - name: Install datadog-ci globally
      shell: bash
      run: |
        npm install -g @datadog/datadog-ci@5.21.0
        echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
