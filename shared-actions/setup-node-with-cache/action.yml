name: 'Setup Node with Enhanced Caching'
description: 'Setup Node.js with yarn caching and GitHub packages registry. Supports both setup-node and asdf-vm.'
inputs:
  node-version:
    description: 'Node.js version to use (ignored if use-asdf is true)'
    required: false
    default: '20'
  use-asdf:
    description: 'Use asdf-vm for version management (reads from .tool-versions)'
    required: false
    default: 'false'
  GH_TOKEN:
    description: 'GitHub token for private packages'
    required: true
  enable-yarn-cache:
    description: 'Enable yarn global cache (~/.cache/yarn)'
    required: false
    default: 'true'
  cache-mode:
    description: 'Cache strategy: "full" (node_modules + yarn cache), "node_modules-only", or "yarn-cache-only"'
    required: false
    default: 'full'
  disable-restore-keys:
    description: 'Disable restore-keys to avoid restoring stale caches (forces exact key match)'
    required: false
    default: 'false'
  use-tmpfs:
    description: 'Mount tmpfs (RAM-backed) at cache target paths to bypass disk I/O and memcg dirty-page accounting (PLT-3439).'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    # Mount tmpfs at paths that will receive cached content, before any cache
    # restore runs. On ARC scale-set runners the pod's ephemeral storage is
    # shared across the k8s node and is IOPS-throttled at the cgroup level;
    # extracting hundreds of MB of small files into it triggers writeback
    # backpressure that blocks subsequent syscalls for tens of seconds.
    # Using tmpfs avoids both the disk and the memcg dirty-page budget.
    # Graceful: if mount fails (e.g. no CAP_SYS_ADMIN), we log and continue
    # with disk-backed paths. See https://typeform.atlassian.net/browse/PLT-3439.
    - name: Mount tmpfs at cache targets
      if: ${{ inputs.use-tmpfs == 'true' && !env.ACT }}
      shell: bash
      run: |
        set +e
        mount_tmpfs() {
          local path="$1"
          local size="$2"
          sudo mkdir -p "$path" 2>/dev/null
          if sudo mount -t tmpfs -o size="$size" tmpfs "$path" 2>/tmp/mount.err; then
            sudo chown -R "$(id -u):$(id -g)" "$path" 2>/dev/null
            echo "✓ mounted tmpfs size=$size at $path"
          else
            echo "⚠ tmpfs mount failed at $path: $(cat /tmp/mount.err 2>/dev/null)"
            echo "  Continuing with disk-backed storage."
          fi
        }

        if [ "${{ inputs.use-asdf }}" == "true" ]; then
          mount_tmpfs "$HOME/.asdf/installs" "2g"
          mount_tmpfs "$HOME/.asdf/plugins" "200m"
        fi

        case "${{ inputs.cache-mode }}" in
          full|node_modules-only|"")
            mount_tmpfs "$GITHUB_WORKSPACE/node_modules" "3g"
            ;;
        esac

        case "${{ inputs.cache-mode }}" in
          full|yarn-cache-only)
            mount_tmpfs "$HOME/.cache/yarn" "1g"
            ;;
        esac

        echo "=== Mounted filesystems ==="
        mount | grep -E 'tmpfs.*(asdf|node_modules|yarn)' || echo "(no tmpfs mounts present)"

    # Cache 1: asdf installations (Node.js and Yarn binaries)
    # This cache is separate because it only changes when .tool-versions is updated,
    # which happens infrequently (only when upgrading Node/Yarn versions).
    # By caching it separately, we avoid re-downloading binaries on every dependency change.
    - name: Cache asdf installations
      if: ${{ inputs.use-asdf == 'true' && !env.ACT }}
      uses: actions/cache@v5
      id: asdf-cache
      with:
        path: |
          ~/.asdf/installs
          ~/.asdf/plugins
        key: ${{ runner.os }}-${{ runner.arch }}-asdf-${{ hashFiles('**/.tool-versions') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-asdf-
    
    - name: Set up Node.js with asdf
      if: ${{ inputs.use-asdf == 'true' }}
      uses: asdf-vm/actions/install@v4
    
    - name: Reshim asdf after cache restore
      if: ${{ inputs.use-asdf == 'true' && steps.asdf-cache.outputs.cache-hit == 'true' }}
      shell: bash
      run: |
        asdf reshim nodejs
        asdf reshim yarn
    
    - name: Set up Node.js with setup-node
      if: ${{ inputs.use-asdf != 'true' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
    
    - name: Get yarn cache directory path
      id: yarn-cache-dir-path
      shell: bash
      run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
    
    - name: Set GitHub packages registry
      shell: bash
      run: |
        npm config set '//npm.pkg.github.com/:_authToken' ${{ inputs.GH_TOKEN }}
        npm config set @typeform:registry https://npm.pkg.github.com/
    
    # Cache 2: yarn dependencies (node_modules and yarn global cache)
    # This cache changes whenever package.json or yarn.lock is modified.
    # It's separate from the asdf cache so that dependency updates don't invalidate
    # the cached Node.js binaries, making builds more efficient.
    # Note: restore-keys allows partial matches, which can restore stale caches.
    # If you need to force a fresh install, manually delete old caches at:
    # https://github.com/Typeform/<repo>/actions/caches
    
    # Determine cache paths based on cache-mode input
    - name: Set cache paths
      id: cache-paths
      shell: bash
      run: |
        CACHE_MODE="${{ inputs.cache-mode }}"
        
        case "$CACHE_MODE" in
          "node_modules-only")
            echo "Cache mode: node_modules only (no yarn cache)"
            PATHS="node_modules
        apps/**/node_modules
        packages/**/node_modules"
            ;;
          "yarn-cache-only")
            echo "Cache mode: yarn cache only (no node_modules)"
            PATHS="~/.cache/yarn"
            ;;
          "full"|*)
            echo "Cache mode: full (node_modules + yarn cache)"
            PATHS="node_modules
        apps/**/node_modules
        packages/**/node_modules
        ~/.cache/yarn"
            ;;
        esac
        
        # Write paths to output using heredoc to preserve newlines
        echo "paths<<EOF" >> $GITHUB_OUTPUT
        echo "$PATHS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        # Set cache key suffix based on mode
        echo "key-suffix=-$CACHE_MODE" >> $GITHUB_OUTPUT
    
    - name: Get yarn cache
      if: ${{ !env.ACT }}
      uses: actions/cache@v5
      id: yarn-cache
      with:
        path: ${{ steps.cache-paths.outputs.paths }}
        key: ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('**/yarn.lock', '**/package.json') }}${{ steps.cache-paths.outputs.key-suffix }}
        restore-keys: ${{ inputs.disable-restore-keys != 'true' && format('{0}-{1}-yarn-', runner.os, runner.arch) || '' }}
    
    - name: Debug cache contents
      id: debug-cache
      if: ${{ !env.ACT && steps.yarn-cache.outputs.cache-hit == 'true' }}
      shell: bash
      run: |
        set +e  # Don't exit on error - we want to continue even if find fails
        
        echo "=== 🔍 Cache Debug Info ==="
        echo "Cache key: ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('**/yarn.lock', '**/package.json') }}"
        echo ""
        
        echo "=== 📦 Root node_modules Status ==="
        if [ -d "node_modules" ]; then
          MODULE_COUNT=$(ls -1 node_modules 2>/dev/null | wc -l | tr -d ' ')
          echo "✅ node_modules exists"
          echo "📊 Package count: $MODULE_COUNT"
          echo "🔒 Yarn integrity: $([ -f 'node_modules/.yarn-integrity' ] && echo '✅ present' || echo '❌ missing')"
        else
          echo "❌ node_modules directory not found"
        fi
        echo ""
        
        echo "=== 🏢 Workspace Structure ==="
        # Use find with || true to prevent failures when directories don't exist
        WORKSPACE_PACKAGES=$(find packages/*/package.json apps/*/package.json -type f 2>/dev/null || true | wc -l | tr -d ' ')
        WORKSPACE_MODULES=$(find packages/*/node_modules apps/*/node_modules -maxdepth 0 -type d 2>/dev/null || true | wc -l | tr -d ' ')
        echo "📦 Workspace packages: $WORKSPACE_PACKAGES"
        echo "🔗 Workspace node_modules: $WORKSPACE_MODULES"
        
        if [ "$WORKSPACE_PACKAGES" -gt 0 ]; then
          echo ""
          echo "Workspace packages found:"
          find packages/*/package.json apps/*/package.json -type f 2>/dev/null || true | sed 's|/package.json||' | sed 's|^|  - |'
        fi
        echo ""
        
        set -e  # Re-enable exit on error
    
    - name: Clean stale nested node_modules on restore-key fallback
      if: ${{ !env.ACT && steps.yarn-cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        # When actions/cache reports cache-hit != 'true', it means either:
        # 1. Complete cache miss (no node_modules directory exists)
        # 2. Restore-key fallback (stale node_modules from a previous lockfile)
        #
        # Case 2 is dangerous: yarn install --frozen-lockfile installs the correct
        # top-level packages but does NOT delete leftover nested node_modules/ dirs
        # from the stale cache. This causes version conflicts (e.g., @types/react@17
        # persisting inside a dependency's node_modules after upgrading to React 18).
        #
        # Fix: if node_modules exists (restore-key fallback), purge all nested
        # node_modules directories inside dependencies before yarn install.
        
        if [ -d "node_modules" ]; then
          echo "=== 🧹 Stale Cache Cleanup ==="
          echo "Cache was restored via restore-key fallback (not exact match)"
          echo "Cleaning nested node_modules to prevent version conflicts..."
          
          # Count nested node_modules before cleanup
          NESTED_COUNT=$(find node_modules -mindepth 2 -name node_modules -type d 2>/dev/null | wc -l | tr -d ' ')
          echo "📦 Found $NESTED_COUNT nested node_modules directories"
          
          if [ "$NESTED_COUNT" -gt 0 ]; then
            # Remove all nested node_modules inside dependencies.
            # This forces yarn install to re-resolve them correctly based on the
            # current lockfile, preventing stale transitive dependencies.
            find node_modules -mindepth 2 -name node_modules -type d -exec rm -rf {} + 2>/dev/null || true
            
            # Also clean nested node_modules in workspace packages
            find packages/*/node_modules -mindepth 2 -name node_modules -type d -exec rm -rf {} + 2>/dev/null || true
            find apps/*/node_modules -mindepth 2 -name node_modules -type d -exec rm -rf {} + 2>/dev/null || true
            
            echo "✅ Cleaned nested node_modules — yarn install will re-resolve them"
          else
            echo "✅ No nested node_modules found — nothing to clean"
          fi
          
          # Remove .yarn-integrity so yarn install runs a full resolution
          rm -f node_modules/.yarn-integrity
          echo "🔒 Removed .yarn-integrity to force full resolution"
        else
          echo "📭 No node_modules directory — clean cache miss, nothing to clean"
        fi
    
    - name: Check if yarn install needed on cache hit
      id: check-install-needed
      if: ${{ !env.ACT }}
      shell: bash
      run: |
        set +e  # Don't exit on error - we want to check all conditions
        
        # Determine if we need to run yarn install even when cache hits.
        #
        # Why this matters:
        # - Cache restores node_modules, but doesn't run postinstall hooks
        # - Monorepos need workspace linking even with cached node_modules
        # - Some projects have critical postinstall scripts (e.g., building native modules)
        # - Cached node_modules might be incomplete or corrupted
        #
        # We detect scenarios that require yarn install on cache hit:
        
        NEEDS_INSTALL=false
        CACHE_HIT="${{ steps.yarn-cache.outputs.cache-hit }}"
        
        # On cache hit, verify cache integrity before trusting it
        if [ "$CACHE_HIT" == "true" ]; then
          echo "=== 🔍 Verifying Cache Integrity ==="
          
          # Verification 1: Check if node_modules exists and has content
          if [ ! -d "node_modules" ]; then
            echo "❌ node_modules directory missing - forcing install"
            NEEDS_INSTALL=true
          else
            MODULE_COUNT=$(ls -1 node_modules 2>/dev/null | wc -l | tr -d ' ')
            if [ "$MODULE_COUNT" -lt 5 ]; then
              echo "⚠️ node_modules appears empty ($MODULE_COUNT packages) - forcing install"
              NEEDS_INSTALL=true
            fi
          fi
          
          # Verification 2: Check yarn integrity file
          if [ "$NEEDS_INSTALL" == "false" ] && [ ! -f "node_modules/.yarn-integrity" ]; then
            echo "⚠️ Missing .yarn-integrity file - cache may be incomplete, forcing install"
            NEEDS_INSTALL=true
          fi
          
          # Verification 3: For workspaces, verify workspace packages have node_modules
          if [ "$NEEDS_INSTALL" == "false" ]; then
            WORKSPACE_PACKAGES=$(find packages/*/package.json apps/*/package.json -type f 2>/dev/null || true | wc -l | tr -d ' ')
            if [ "$WORKSPACE_PACKAGES" -gt 0 ]; then
              WORKSPACE_MODULES=$(find packages/*/node_modules apps/*/node_modules -maxdepth 0 -type d 2>/dev/null || true | wc -l | tr -d ' ')
              if [ "$WORKSPACE_MODULES" -eq 0 ]; then
                echo "⚠️ Workspace packages exist but no workspace node_modules found - forcing install"
                NEEDS_INSTALL=true
              fi
            fi
          fi
          
          if [ "$NEEDS_INSTALL" == "false" ]; then
            echo "✅ Cache integrity verified"
          fi
        fi
        
        # Check for monorepo configurations that need install
        if [ "$NEEDS_INSTALL" == "false" ]; then
          # 1. Yarn workspaces: Check if workspace node_modules are cached
          #    If we cache workspace node_modules explicitly (apps/**/node_modules, packages/**/node_modules),
          #    then symlinks work correctly and we don't need to run yarn install.
          #    If workspace node_modules are missing, we must run yarn install to populate them.
          if grep -q '"workspaces"' package.json 2>/dev/null; then
            # Check if workspace node_modules directories exist (were cached)
            WORKSPACE_MODULES=$(find packages/*/node_modules apps/*/node_modules -maxdepth 0 -type d 2>/dev/null | wc -l | tr -d ' ')
            if [ "$WORKSPACE_MODULES" -gt 0 ]; then
              echo "✅ Yarn workspaces detected with cached node_modules ($WORKSPACE_MODULES workspaces)"
              echo "   ✅ Workspace symlinks preserved - install NOT needed"
              NEEDS_INSTALL=false
            else
              echo "⚠️ Yarn workspaces detected but workspace node_modules missing"
              echo "   ⚠️ Install needed to populate workspace directories"
              NEEDS_INSTALL=true
            fi
          fi
          
          # 2. Lerna monorepo: Need lerna bootstrap (usually in postinstall hook)
          if [ -f "lerna.json" ]; then
            echo "📦 Detected Lerna monorepo - install needed for lerna bootstrap"
            NEEDS_INSTALL=true
          fi
          
          # 3. Postinstall hook: install needed so we can run the root postinstall explicitly
          #    (dependency postinstall scripts are blocked by --ignore-scripts)
          if grep -q '"postinstall"' package.json 2>/dev/null; then
            echo "🔧 Detected postinstall hook - install needed to run root postinstall"
            NEEDS_INSTALL=true
            HAS_POSTINSTALL=true
          fi
        fi
        
        echo "needs-install=$NEEDS_INSTALL" >> $GITHUB_OUTPUT
        echo "has-postinstall=${HAS_POSTINSTALL:-false}" >> $GITHUB_OUTPUT
    
    - name: Log cache status and decision
      if: ${{ !env.ACT }}
      shell: bash
      run: |
        echo "=== 📊 Cache Status Summary ==="
        if [ "${{ steps.yarn-cache.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Cache HIT - Dependencies restored from cache"
          echo "📦 Cache key: ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('**/yarn.lock', '**/package.json') }}"
          echo ""
          if [ "${{ steps.check-install-needed.outputs.needs-install }}" == "true" ]; then
            echo "🔄 Decision: WILL run yarn install"
            echo "Reasons: Cache verification failed, workspace linking needed, or postinstall hooks detected"
          else
            echo "⚡ Decision: SKIP yarn install"
            echo "Reason: Cache verified and no workspace linking or postinstall hooks required"
          fi
        else
          echo "❌ Cache MISS - Fresh installation required"
          echo "🔍 Looking for key: ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('**/yarn.lock', '**/package.json') }}"
          echo ""
          echo "🔄 Decision: WILL run yarn install"
        fi
        echo ""
    
    - name: Install Node.js dependencies
      if: ${{ !env.ACT && (steps.yarn-cache.outputs.cache-hit != 'true' || steps.check-install-needed.outputs.needs-install == 'true') }}
      shell: bash
      run: yarn install --frozen-lockfile --ignore-scripts
      env:
        NODE_AUTH_TOKEN: ${{ inputs.GH_TOKEN }}
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

    - name: Run root postinstall script
      if: ${{ !env.ACT && steps.check-install-needed.outputs.has-postinstall == 'true' }}
      shell: bash
      run: |
        echo "🔧 Running root postinstall script"
        yarn run postinstall
      env:
        NODE_AUTH_TOKEN: ${{ inputs.GH_TOKEN }}
