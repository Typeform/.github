name: 'Slack Deployment Notification'
description: 'Send deployment success or failure notifications to Slack, matching the backend deploy message format used in #tfprod-deploy'
inputs:
  slack-channel:
    description: 'Slack channel ID for notifications (e.g., tfprod-deploy)'
    required: true
  app-name:
    description: 'Application name being deployed'
    required: true
  deployment-status:
    description: 'Deployment status: success or failure'
    required: true
  cdn-url:
    description: 'Public CDN URL for the deployed application (included in success messages)'
    required: false
    default: ''
  github-sha:
    description: 'Git commit SHA'
    required: true
  github-actor:
    description: 'GitHub user who triggered the deployment'
    required: true
  github-repository:
    description: 'Repository name (owner/repo)'
    required: true
  github-server-url:
    description: 'GitHub server URL'
    required: true
  github-run-id:
    description: 'GitHub Actions run ID'
    required: true
  team-slack-handle:
    description: 'Team Slack handle to mention on failure (e.g., @tech-frontend). Leave empty to skip team mention.'
    required: false
    default: ''
  SLACK_BOT_TOKEN:
    description: 'Slack OAuth token for posting messages'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Prepare short SHA
      id: commit
      shell: bash
      run: |
        echo "short_sha=$(echo ${{ inputs.github-sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

    - name: Send success notification
      if: ${{ inputs.deployment-status == 'success' }}
      uses: slackapi/slack-github-action@v1.27.0
      with:
        channel-id: ${{ inputs.slack-channel }}
        payload: |
          {
            "text": "🚀 `${{ inputs.app-name }}:${{ steps.commit.outputs.short_sha }}` was deployed to production by *${{ inputs.github-actor }}*${{ inputs.cdn-url != '' && format(' (<{0}|CDN>)', inputs.cdn-url) || '' }}"
          }
      env:
        SLACK_BOT_TOKEN: ${{ inputs.SLACK_BOT_TOKEN }}

    - name: Send failure notification
      if: ${{ inputs.deployment-status == 'failure' }}
      uses: slackapi/slack-github-action@v1.27.0
      with:
        channel-id: ${{ inputs.slack-channel }}
        payload: |
          {
            "text": "🔥 The deployment of `${{ inputs.app-name }}:${{ steps.commit.outputs.short_sha }}` to production by *${{ inputs.github-actor }}* has failed (<${{ inputs.github-server-url }}/${{ inputs.github-repository }}/actions/runs/${{ inputs.github-run-id }}|logs>)${{ inputs.team-slack-handle != '' && format(' {0}', inputs.team-slack-handle) || '' }}"
          }
      env:
        SLACK_BOT_TOKEN: ${{ inputs.SLACK_BOT_TOKEN }}

branding:
  icon: 'message-circle'
  color: 'purple'
